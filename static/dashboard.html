<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — FB Post ID Collector</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14; --card: #111827; --card2: #1a2235; --border: #1e2d45;
      --blue: #1877f2; --blue-dark: #1256b8;
      --green: #00d084; --red: #ff4d6d; --yellow: #fbbf24;
      --text: #e8edf5; --muted: #6b7a99;
      --mono: 'JetBrains Mono', monospace; --sans: 'Sora', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

    /* Navbar */
    .navbar {
      background: #0d1421; border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 16px; font-weight: 700; }
    .nav-logo span { color: var(--blue); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: var(--muted); }
    .nav-user strong { color: var(--text); }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 14px; border-radius: 8px; font-family: var(--sans);
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { background: rgba(255,77,109,0.1); border-color: var(--red); color: var(--red); }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 0; }
    .label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .input-group { margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; }
    .input-row .input-group { flex: 1; }

    input, select {
      width: 100%; padding: 13px 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,119,242,0.12); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--card); }

    .date-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .date-row .input-group { flex: 1; min-width: 150px; }

    .tabs {
      display: flex; gap: 6px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 5px; margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; background: none; border: none;
      border-radius: 8px; color: var(--muted); font-family: var(--sans);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--blue); color: #fff; }
    .tab-btn:hover:not(.active) { background: var(--card2); color: var(--text); }

    .btn-collect {
      width: 100%; padding: 15px; background: var(--blue); color: #fff;
      border: none; border-radius: 12px; font-family: var(--sans);
      font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-collect:hover { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(24,119,242,0.35); }
    .btn-collect:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0 12px; }
    .stat-card {
      flex: 1; min-width: 90px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center;
    }
    .stat-card .num { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--blue); }
    .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .action-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .action-btn {
      flex: 1; min-width: 110px; padding: 10px 14px;
      border: 1px solid var(--border); background: var(--card);
      border-radius: 8px; color: var(--text); font-family: var(--sans);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .action-btn:hover { background: var(--card2); border-color: var(--blue); color: var(--blue); }
    .action-btn.green { border-color: rgba(0,208,132,0.3); color: var(--green); }
    .action-btn.green:hover { background: rgba(0,208,132,0.08); }

    .posts-list { display: flex; flex-direction: column; gap: 8px; }
    .post-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      animation: fadeIn 0.3s ease forwards;
    }
    .post-item:hover { border-color: rgba(24,119,242,0.4); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .post-index { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }
    .post-info { flex: 1; min-width: 0; }
    .post-id { font-family: var(--mono); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .badge-pub { background: rgba(0,208,132,0.12); color: var(--green); border: 1px solid rgba(0,208,132,0.2); }
    .badge-sch { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
    .badge-today { background: rgba(24,119,242,0.12); color: var(--blue); border: 1px solid rgba(24,119,242,0.2); }
    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 7px 13px; font-family: var(--sans);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .copy-btn:hover { background: var(--card2); color: var(--text); border-color: var(--blue); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .state-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--muted);
    }
    .state-box .emoji { font-size: 36px; margin-bottom: 12px; }
    .state-box.error { border-color: rgba(255,77,109,0.3); }
    .state-box.error .msg { color: var(--red); }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .page-btn {
      padding: 8px 14px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-family: var(--sans); font-size: 13px; cursor: pointer;
    }
    .page-btn:hover, .page-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1e2d45; border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }

    @media (max-width: 500px) { .input-row { flex-direction: column; } }
  </style>
</head>
<body>

  <div id="toast"></div>

  <nav class="navbar">
    <div class="nav-logo">FB <span>Post ID</span> Collector</div>
    <div class="nav-right">
      <span class="nav-user">👤 <strong id="navUser"></strong></span>
      <button class="logout-btn" onclick="logout()">লগআউট</button>
    </div>
  </nav>

  <div class="container">
    <div class="input-row">
      <div class="input-group">
        <div class="label">পোস্ট সংখ্যা</div>
        <select id="limit">
          <option value="10">১০টা</option>
          <option value="25">২৫টা</option>
          <option value="50" selected>৫০টা</option>
          <option value="100">১০০টা (সর্বোচ্চ)</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <div class="label">তারিখ ফিল্টার (ঐচ্ছিক)</div>
      <div class="date-row">
        <div class="input-group"><input type="date" id="dateFrom" title="শুরু তারিখ"></div>
        <div class="input-group"><input type="date" id="dateTo" title="শেষ তারিখ"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('published')" id="t0">📢 Published</button>
      <button class="tab-btn" onclick="switchTab('scheduled')"  id="t1">⏰ Scheduled</button>
      <button class="tab-btn" onclick="switchTab('today')"      id="t2">📅 আজকের</button>
    </div>

    <button class="btn-collect" id="collectBtn" onclick="fetchPosts()">🔍 Post IDs কালেক্ট করো</button>

    <div id="resultsArea"></div>
  </div>

  <script>
    let currentType = 'published';
    let allPosts    = [];
    let currentPage = 1;
    const PER_PAGE  = 20;
    const token     = localStorage.getItem('auth_token');
    const username  = localStorage.getItem('auth_user');
    const role      = localStorage.getItem('auth_role');

    if (!token) window.location.href = '/';
    document.getElementById('navUser').textContent = username || '';

    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('dateTo').value = today;
    document.getElementById('dateTo').max   = today;

    function switchTab(type) {
      currentType = type;
      ['t0','t1','t2'].forEach((id, i) => {
        document.getElementById(id).classList.toggle('active', ['published','scheduled','today'][i] === type);
      });
    }

    async function fetchPosts() {
      const limit    = document.getElementById('limit').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo   = document.getElementById('dateTo').value;
      const btn      = document.getElementById('collectBtn');
      const area     = document.getElementById('resultsArea');

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> লোড হচ্ছে...';
      area.innerHTML = '';
      allPosts = [];

      try {
        let url = `/api/posts?type=${currentType}&limit=${limit}`;
        if (dateFrom) url += `&from=${dateFrom}`;
        if (dateTo)   url += `&to=${dateTo}`;

        const res  = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        if (!res.ok) { area.innerHTML = errBox(data.error || 'সমস্যা হয়েছে'); return; }

        allPosts    = data.posts || [];
        currentPage = 1;
        if (!allPosts.length) { area.innerHTML = emptyBox('কোনো পোস্ট পাওয়া যায়নি'); return; }
        renderResults();

      } catch { area.innerHTML = errBox('সার্ভারে সংযোগ করতে পারছে না'); }
      finally {
        btn.disabled  = false;
        btn.innerHTML = '🔍 Post IDs কালেক্ট করো';
      }
    }

    function renderResults() {
      const area   = document.getElementById('resultsArea');
      const total  = allPosts.length;
      const pages  = Math.ceil(total / PER_PAGE);
      const start  = (currentPage - 1) * PER_PAGE;
      const slice  = allPosts.slice(start, start + PER_PAGE);
      const pubC   = allPosts.filter(p => p.type === 'Published').length;
      const schC   = allPosts.filter(p => p.type === 'Scheduled').length;

      let html = `
        <div class="stats-bar">
          <div class="stat-card"><div class="num">${total}</div><div class="lbl">মোট পোস্ট</div></div>
          <div class="stat-card"><div class="num">${pubC}</div><div class="lbl">Published</div></div>
          <div class="stat-card"><div class="num">${schC}</div><div class="lbl">Scheduled</div></div>
        </div>
        <div class="action-row">
          <button class="action-btn green" onclick="bulkCopy()">📋 সব Copy</button>
          <button class="action-btn green" onclick="downloadCSV()">📥 CSV Download</button>
        </div>
        <div class="posts-list">`;

      slice.forEach((post, i) => {
        const idx   = start + i + 1;
        const badge = post.type === 'Scheduled' ? 'badge-sch' : (currentType === 'today' ? 'badge-today' : 'badge-pub');
        html += `
          <div class="post-item">
            <span class="post-index">#${idx}</span>
            <div class="post-info">
              <div class="post-id">${post.id}</div>
              <div class="post-meta">${post.date} &nbsp;<span class="badge ${badge}">${post.type}</span></div>
            </div>
            <button class="copy-btn" id="cbtn-${post.id.replace('_','-')}" onclick="copyId('${post.id}')">Copy</button>
          </div>`;
      });

      html += `</div>`;

      if (pages > 1) {
        html += `<div class="pagination">`;
        html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← আগে</button>`;
        for (let p = 1; p <= pages; p++)
          html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
        html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>পরে →</button>`;
        html += `</div>`;
      }

      area.innerHTML = html;
    }

    function goPage(p) {
      const pages = Math.ceil(allPosts.length / PER_PAGE);
      if (p < 1 || p > pages) return;
      currentPage = p;
      renderResults();
      document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyId(id) {
      navigator.clipboard.writeText(id).then(() => {
        const safeId = id.replace('_','-');
        const btn = document.getElementById('cbtn-' + safeId);
        if (btn) { btn.textContent = '✅'; btn.classList.add('copied'); }
        setTimeout(() => { if (btn) { btn.textContent = 'Copy'; btn.classList.remove('copied'); } }, 2000);
      });
    }

    function bulkCopy() {
      navigator.clipboard.writeText(allPosts.map(p => p.id).join('\n')).then(() => showToast('✅ সব Post ID Copy হয়েছে!'));
    }

    function downloadCSV() {
      if (!allPosts.length) return;
      let csv = 'Post ID,Type,Date & Time\n';
      allPosts.forEach(p => { csv += `"${p.id}","${p.type}","${p.date}"\n`; });
      const link = document.createElement('a');
      link.href  = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }));
      link.download = `FB_Posts_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(t._t);
      t._t = setTimeout(() => t.style.opacity = '0', 2500);
    }

    function errBox(msg)   { return `<div class="state-box error"><div class="emoji">⚠️</div><div class="msg">${msg}</div></div>`; }
    function emptyBox(msg) { return `<div class="state-box"><div class="emoji">🔍</div><div>${msg}</div></div>`; }
  </script>
</body>
</html>
